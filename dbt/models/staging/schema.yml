version: 2

models:
  - name: stg_weather
    description: Cleaned daily weather observations for 20 Swedish cities
    columns:
      - name: city
        tests:
          - not_null
      - name: weather_date
        tests:
          - not_null
      - name: bidding_zone
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SE1', 'SE2', 'SE3', 'SE4']

  - name: stg_energy
    description: Cleaned hourly day-ahead electricity spot prices for SE1-SE4
    columns:
      - name: bidding_zone
        tests:
          - not_null
          - accepted_values:
              arguments:
                values: ['SE1', 'SE2', 'SE3', 'SE4']
      - name: timestamp_utc
        tests:
          - not_null
      - name: price_eur_mwh
        tests:
          - not_null
